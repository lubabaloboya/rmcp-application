services:
  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rmcp-api
    working_dir: /var/www/api
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    environment:
      APP_ENV: local
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_CACHE_DB: "1"
      REDIS_QUEUE_CONNECTION: default
      REDIS_QUEUE: default
      MAIL_MAILER: smtp
      MAIL_HOST: mailhog
      MAIL_PORT: "1025"
      MAIL_FROM_ADDRESS: noreply@rmcp.local
      MAIL_FROM_NAME: RMCP
      DB_CONNECTION: sqlsrv
      DB_HOST: mssql
      DB_PORT: "1433"
      DB_DATABASE: rmcp
      DB_USERNAME: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD:-Rmcp@123456}
      DB_TRUST_SERVER_CERTIFICATE: "true"
    volumes:
      - ./api:/var/www/api
    depends_on:
      mssql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version > /dev/null || exit 1"]
      interval: 30s
      timeout: 25s
      retries: 5
      start_period: 40s
    networks:
      - rmcp-net

  nginx:
    image: nginx:1.27-alpine
    container_name: rmcp-nginx
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/api
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - rmcp-net

  web:
    image: nginx:1.27-alpine
    container_name: rmcp-web
    ports:
      - "4200:80"
    command: ["nginx", "-g", "daemon off;"]
    networks:
      - rmcp-net
    volumes:
      - ./docker/web/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist/rmcp-web/browser:/usr/share/nginx/html:ro

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: rmcp-cloudbeaver
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver-workspace:/opt/cloudbeaver/workspace
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - rmcp-net

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: rmcp-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Rmcp@123456}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "pidof sqlservr >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - rmcp-net

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: rmcp-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - rmcp-net

  redis:
    image: redis:7-alpine
    container_name: rmcp-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - rmcp-net

volumes:
  mssql-data:
  cloudbeaver-workspace:

networks:
  rmcp-net:
    driver: bridge
