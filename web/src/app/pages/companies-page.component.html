<section class="panel">
  <h3>{{ editingId() ? 'Edit Company' : 'Create Company' }}</h3>
  <form [formGroup]="form" (ngSubmit)="saveCompany()" class="form-grid">
    <label>
      Company Name
      <input type="text" formControlName="company_name" />
    </label>

    <label>
      Registration Number
      <input type="text" formControlName="registration_number" />
    </label>

    <label>
      Tax Number
      <input type="text" formControlName="tax_number" />
    </label>

    <label>
      Industry
      <input type="text" formControlName="industry" />
    </label>

    <label>
      Phone
      <input type="text" formControlName="phone" />
    </label>

    <label>
      Email
      <input type="email" formControlName="email" />
    </label>

    <label class="full-width">
      Address
      <input type="text" formControlName="address" />
    </label>

    <div class="actions">
      <button type="submit" [disabled]="saving()">{{ saving() ? 'Saving...' : (editingId() ? 'Update Company' : 'Create Company') }}</button>
      @if (editingId()) {
        <button type="button" class="ghost" (click)="startCreate()">Cancel Edit</button>
      }
    </div>
  </form>
</section>

<section class="panel">
  <h3>Companies</h3>

  @if (loading()) {
    <p>Loading companies...</p>
  }

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (company of companies(); track company.id) {
          <tr>
            <td>{{ company.company_name }}</td>
            <td class="row-actions">
              <button type="button" class="ghost" (click)="startEdit(company)">Edit</button>
              <button type="button" [disabled]="deletingId() === company.id" (click)="deleteCompany(company.id)">
                {{ deletingId() === company.id ? 'Deleting...' : 'Delete' }}
              </button>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="2">No companies yet.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
