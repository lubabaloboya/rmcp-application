<section class="panel">
  <h3>Audit Logs</h3>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Time</th><th>User</th><th>Module</th><th>Action</th><th>Record ID</th></tr></thead>
      <tbody>
        @for (log of logs(); track log.id) {
          <tr>
            <td>{{ log.created_at | date:'medium' }}</td>
            <td>{{ log.user?.name || 'System' }}</td>
            <td>{{ log.module }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.record_id || '-' }}</td>
          </tr>
        } @empty {
          <tr><td colspan="5">No audit logs.</td></tr>
        }
      </tbody>
    </table>
  </div>
</section>
