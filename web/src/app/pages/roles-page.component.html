<section class="panel">
  <h3>Roles & Permission Matrix</h3>
  <ng-container *ngFor="let role of roles()">
    <article class="role-card">
      <h4>{{ role.role_name }}</h4>
      <ng-container *ngIf="savingRoleId() === role.id"><p>Saving...</p></ng-container>
      <div class="perm-grid">
        <ng-container *ngFor="let perm of catalog()">
          <label>
            <input type="checkbox" [checked]="hasPermission(role, perm)" (change)="togglePermission(role, perm)" />
            {{ perm }}
          </label>
        </ng-container>
      </div>
    </article>
  </ng-container>
</section>
