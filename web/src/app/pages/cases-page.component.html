<section class="panel">
  <h3>RMCP Lifecycle Cases</h3>
  <form [formGroup]="form" (ngSubmit)="createCase()" class="grid">
    <label>Client ID <input type="number" formControlName="client_id" /></label>
    <label>Title <input type="text" formControlName="title" /></label>
    <label class="full">Description <input type="text" formControlName="description" /></label>
    <label>SLA Due <input type="datetime-local" formControlName="sla_due_at" /></label>
    <button type="submit">Create Case</button>
  </form>
</section>

<section class="panel">
  <h3>Case Queue</h3>
  @if (loading()) { <p>Loading...</p> }
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Title</th><th>Stage</th><th>Status</th><th>SLA</th><th>Actions</th></tr></thead>
      <tbody>
        @for (item of cases(); track item.id) {
          <tr>
            <td>{{ item.case_number }}</td>
            <td>{{ item.title }}</td>
            <td>{{ item.stage }}</td>
            <td>{{ item.status }}</td>
            <td>{{ item.sla_due_at || '-' }}</td>
            <td class="actions">
              <button type="button" (click)="submitCase(item)">Submit</button>
              <button type="button" (click)="approveCase(item)">Approve</button>
              <button type="button" (click)="rejectCase(item)">Reject</button>
              <button type="button" (click)="closeCase(item)">Close</button>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="6">No cases yet.</td></tr>
        }
      </tbody>
    </table>
  </div>
</section>
