server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Force /login to main entry URL as requested.
    location = /login {
        return 302 http://localhost:4200/;
    }

    # Angular SPA fallback: serve index.html for app routes like /login.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Keep HTML uncached so new deployments load the latest app shell/chunk map.
    location ~* \.html$ {
        try_files $uri =404;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Cache immutable static assets aggressively.
    location ~* \.(?:css|js|mjs|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
